<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>
    <!-- Map container -->
    <div id="map" style="width: 100%; height: 100vh;"></div>

    <!-- Floating UI panel -->
    <div id="ui-panel">
    <h4>Pedestrian & Cyclist Toronto Crash Map</h4>
    <p>This map shows pedestrian & cyclist collisions aggregated into hexagonal bins. Hover over each bin to see the number of crashes</p>

    <!-- Legend -->
    <div class="legend">
        <h5>Number of Crashes</h5>
        <div><span class="box" style="background:#ffffff;"></span> 1–14.4</div>
        <div><span class="box" style="background:#FAC7C8;"></span> 14.5–28.8</div>
        <div><span class="box" style="background:#F58F92;"></span> 28.9–43.2</div>
        <div><span class="box" style="background:#EF575C;"></span> 43.3–57.6</div>
        <div><span class="box" style="background:#EA1D25;"></span> 57.7–72</div>
    </div>

    <!-- Layer toggles -->
    <div class="controls">
        <h5>Map Layers</h5>
        <label>
        <input type="checkbox" id="toggle-points" checked>
        Show Crash Points
        </label><br>

        <label>
        <input type="checkbox" id="toggle-hex" checked>
        Show Hexgrid
        </label>
    </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
